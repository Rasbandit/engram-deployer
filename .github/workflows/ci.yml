name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (-race)
        run: go test -race -timeout 60s ./...

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate plugin manifest XML
        run: |
          # XML comments may not contain '--'. Easy to introduce by accident
          # in a code-example block, breaks Unraid's plugin parser silently.
          xmllint --noout package/engram-deployer.plg

      - name: Build tarball (smoke)
        run: bash package/build-tarball.sh 0.0.0-ci
